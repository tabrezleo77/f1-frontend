const trackSelector = document.getElementById("trackSelect");
window.onload=function(){
    updateTrackInfo();
};
trackSelector.addEventListener("change", updateTrackInfo);

        function updateTrackInfo() {
            const selectedKey = trackSelector.value;
            const data = tracksData[selectedKey];

            if (data) {
                document.getElementById("trackName").innerText = data.name;
                document.getElementById("trackLength").innerText = data.length;
                document.getElementById("trackLaps").innerText = data.laps;
                document.getElementById("trackRecord").innerText = data.record;
                document.getElementById("winner2025").innerText = data[2025];
                document.getElementById("trackHolder").innerText = data.holder;
                
                const imgEl = document.getElementById("trackMapImg");
                imgEl.src = data.img;
                imgEl.style.display = "block";
            }
        }
