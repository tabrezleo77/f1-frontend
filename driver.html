        const selector = document.getElementById("driverSelect");

        function updateDriverInfo() {
            const data = driversData[selector.value];
            if (data) {
            
                document.getElementById("driverName").innerText = data.name;
                document.getElementById("teamName").innerText = data.team;
                document.getElementById("driverCountry").innerText = data.country;
                document.getElementById("podiums").innerText = data.podiums;
                document.getElementById("driverTitles").innerText = data.titles;
                document.getElementById("poles").innerText = data.poles;
                document.getElementById("DNFs").innerText = data.DNFs;
                document.getElementById("driverImg").src = data.img;
                document.getElementById("points").innerText = data.points;
            }
        }

        selector.addEventListener("change", updateDriverInfo);
        window.onload = updateDriverInfo;
